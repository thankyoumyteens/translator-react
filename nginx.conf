server {
    listen 80;
    # 如果你有域名，把 localhost 换成你的域名，比如 server_name yourdomain.com;
    server_name localhost;

    # 1. 把全局 TCP 保持时间缩短到 5 秒（默认通常是 65 秒）
    # 这样 iOS 只要停顿 5 秒不操作，Nginx 就会主动挂断电话，iOS 下次就必须重新拨号。
    keepalive_timeout 5s;

    # 这里的路径必须和 Dockerfile 里 COPY dist 进去的路径严格保持一致
    root /usr/share/nginx/html;
    index index.html;

    # 🚀 防线 1：针对 Vite 打包出的带 Hash 值的静态资源，开启 1 年强缓存，极大提升二次访问速度
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 🚀 防线 2：针对入口页和路由，解决 iOS 缓存不刷新 和 SPA 路由 404 的问题
    location / {
        # 支持 React/Vue 的单页路由（刷新不报 404）
        try_files $uri $uri/ /index.html;

        # 只要请求的是 html 文件，就强行打上“不许缓存”的思想钢印
        if ($request_filename ~* .*\.(htm|html)$) {
            add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate";
        }
    }
}